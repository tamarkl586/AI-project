services:
  mongodb:
    image: mongo:7
    container_name: catalog-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${CATALOG_DB_NAME:-catalogDb}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"db.adminCommand({ ping: 1 }).ok\" mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - microservices-net

  postgres:
    image: postgres:16-alpine
    container_name: identity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IDENTITY_DB_NAME:-identity_db}
      POSTGRES_USER: ${IDENTITY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${IDENTITY_DB_PASSWORD:-postgres}
    ports:
      - "${IDENTITY_DB_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - microservices-net

  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: ticketing-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SecretPass123!#"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\"; elif command -v sqlcmd >/dev/null 2>&1; then sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\"; else bash -c 'echo > /dev/tcp/localhost/1433'; fi"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - microservices-net

  cassandra:
    image: cassandra:4.1
    container_name: drawreport-cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME:-drawreport-cluster}
      CASSANDRA_DC: ${CASSANDRA_DC:-datacenter1}
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e \"DESCRIBE KEYSPACES\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - microservices-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: message-broker
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - microservices-net

  redis:
    image: redis:7-alpine
    container_name: catalog-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - microservices-net

  catalogservice:
    build:
      context: ./server/CatalogService
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      MongoDB_ConnectionString: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/${CATALOG_DB_NAME:-catalogDb}?authSource=admin
      MongoDB_DatabaseName: ${CATALOG_DB_NAME:-catalogDb}
      Redis_ConnectionString: ${CATALOG_REDIS_CONNECTION:-redis:6379}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    deploy:
      replicas: 2
    networks:
      - microservices-net

  identityservice:
    build:
      context: ./server/IdentityService
      dockerfile: Dockerfile
    container_name: identity-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${IDENTITY_DB_NAME:-identity_db};Username=${IDENTITY_DB_USER:-postgres};Password=${IDENTITY_DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices-net

  ticketingservice:
    build:
      context: ./server/TicketingService
      dockerfile: Dockerfile
    container_name: ticketing-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${TICKETING_DB_NAME:-ticketing_db};User Id=sa;Password=SecretPass123!#;TrustServerCertificate=True;"
      Services__CatalogBaseUrl: http://catalogservice:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - microservices-net

  drawreportservice:
    build:
      context: ./server/DrawReportService
      dockerfile: Dockerfile
    container_name: drawreport-service
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Services__CatalogBaseUrl: http://catalogservice:8080
      Cassandra__ContactPoints__0: cassandra
      Cassandra__Port: "9042"
      Cassandra__Keyspace: ${CASSANDRA_KEYSPACE:-insights_db}
      Cassandra__Datacenter: ${CASSANDRA_DC:-datacenter1}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      cassandra:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - microservices-net

  webbff:
    build:
      context: ./server/WebBff
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Services__TicketingBaseUrl: http://ticketingservice:8080
      Services__CatalogBaseUrl: http://catalogservice:8080
    depends_on:
      ticketingservice:
        condition: service_healthy
      catalogservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - microservices-net

  frontend:
    build:
      context: ./client/chineseSale
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q '^ok$'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - microservices-net

  apigateway:
    build:
      context: ./server/ApiGateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
    depends_on:
      identityservice:
        condition: service_healthy
      catalogservice:
        condition: service_healthy
      ticketingservice:
        condition: service_healthy
      drawreportservice:
        condition: service_healthy
      webbff:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices-net

  # ==========================================
  # Centralized Logging: Seq
  # UI available at http://localhost:5341 after docker compose up
  # Services ship structured JSON logs to http://seq (port 80 inside the network)
  # ==========================================
  seq:
    image: datalust/seq:latest
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
  sqlserver_data:
  cassandra_data:
  seq_data: